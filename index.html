<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صيانة+ | المنصة الاحترافية</title>
    <!-- مكتبات Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVAMdnv--5pT4_D2AfoVdZLz7-JqebcZY",
            authDomain: "main-c1837.firebaseapp.com",
            projectId: "main-c1837",
            storageBucket: "main-c1837.firebasestorage.app",
            messagingSenderId: "489553689688",
            appId: "1:489553689688:web:907a47a1885c290211de2d",
            measurementId: "G-MX9YVB5JD3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // اجعلها متاحة لجميع الوظائف
        
        // المزامنة اللحظية (تحديث صامت)
        onSnapshot(collection(db, "requests"), (snapshot) => {
            let reqs = [];
            snapshot.forEach(doc => reqs.push({ ...doc.data(), id: doc.id }));
            window.requests = reqs;
            updateUI();
        });
    </script>
    <style>
        /* (احتفظ بنفس التنسيق القديم لضمان عدم تغير الديزاين) */
        :root { --primary: #1e3a8a; --secondary: #f59e0b; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); }
        .page-view { display: none; } .page-view.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="navigate('home')">صيانة<span>+</span></div>
    </nav>

    <!-- (باقي الصفحات بنفس الترتيب القديم) -->
    <div id="page-home" class="page-view active">
        <button onclick="navigate('client')">دخول العميل</button>
        <button onclick="navigate('admin')">لوحة الإدارة</button>
    </div>

    <script>
        function navigate(page) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
        }

        // دالة إرسال طلب جديد لـ Firebase
        async function submitRequest(srv, desc) {
            try {
                await addDoc(collection(window.db, "requests"), {
                    service: srv,
                    desc: desc,
                    status: "قيد الانتظار",
                    date: new Date().toISOString()
                });
                alert("تم الإرسال بنجاح!");
            } catch (e) { alert("خطأ في الاتصال"); }
        }
    </script>
</body>
</html>
