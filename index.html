<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة+ | المنصة الشاملة</title>
    <!-- ... (تم الاحتفاظ بجميع التنسيقات CSS التي أرسلتها في الكود السابق) ... -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- (ضع هنا كامل محتوى الـ HTML الذي أرسلته أنت في رسالتك السابقة بدءاً من <nav> وحتى نهاية <footer>) -->
    
    <script>
        // هذا هو الرابط البرمجي الخاص بـ Google Apps Script الذي يربطك بملف Google Sheets
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLkOVinbXvqpREygE3xTNy-tdA1uInBx-ruO7P9P2OdDB5b5yzRzc1GAj2Uqet6CFT/exec";

        let db = {
            user: localStorage.getItem('user') || '',
            phone: localStorage.getItem('phone') || '',
            regDate: localStorage.getItem('regDate') || '',
            products: JSON.parse(localStorage.getItem('products')) || [],
            requests: JSON.parse(localStorage.getItem('requests')) || [],
            users: JSON.parse(localStorage.getItem('users')) || [] 
        };

        // المزامنة الصامتة التي تجلب البيانات من Google Sheets كل 5 ثوانٍ
        setInterval(silentBackgroundSync, 5000);

        function silentBackgroundSync() {
            fetch(GOOGLE_SCRIPT_URL + "?action=getData", { cache: "no-cache" })
            .then(res => res.json())
            .then(data => {
                // تحديث البيانات محلياً وعرضها في الجداول
                db.products = data.products;
                db.requests = data.requests;
                db.users = data.users;
                updateUI(); 
            });
        }
        
        // ... (باقي الدوال: navigate, submitRequest, verifyPaymentAndRegister وغيرها كما في كودك) ...
    </script>
</body>
</html>
