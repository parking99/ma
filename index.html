<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة+ | المنصة الشاملة لخدمات الصيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات (مضغوطة للحفاظ على مساحة الكود) */
        :root { --primary: #1e3a8a; --primary-hover: #152b66; --secondary: #f59e0b; --bg: #f8fafc; --white: #ffffff; --text-main: #1f2937; --text-muted: #6b7280; --success: #10b981; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        nav { background-color: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); cursor: pointer;}
        .logo span { color: var(--secondary); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.3s; text-align: center; }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-secondary { background: var(--secondary); color: var(--white); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .page-view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hero { background: linear-gradient(to left, rgba(30, 58, 138, 0.9), rgba(30, 58, 138, 0.7)), url('https://images.unsplash.com/photo-1581094288338-2314dddb7ece?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') center/cover; color: var(--white); text-align: center; padding: 100px 20px; min-height: 70vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 800; }
        .auth-container { max-width: 500px; margin: 60px auto; background: var(--white); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 15px; }
        .dashboard-container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .card { background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); margin-bottom: 25px; border: 1px solid var(--border); }
        .card-header { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 16px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: var(--bg); color: var(--text-muted); }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-working { background: #dbeafe; color: #1d4ed8; }
        .badge-success { background: #d1fae5; color: #059669; }
        .dev-tools { position: fixed; bottom: 20px; right: 20px; background: #333; padding: 10px; border-radius: 8px; display: flex; gap: 10px; z-index: 1000; }
        .dev-tools button { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <nav>
        <div class="logo" onclick="navigate('home')">صيانة<span>+</span></div>
        <div class="nav-links" id="nav-links-container"></div>
    </nav>

    <!-- 1. الرئيسية -->
    <div id="page-home" class="page-view active">
        <section class="hero">
            <h1>راحة بالك.. طوال العام</h1>
            <p style="color: white;">اشترك الآن في الباقة السنوية لخدمات السباكة والكهرباء</p>
            <button class="btn btn-secondary" onclick="loginUser()">تخطي للمنصة (تجربة)</button>
        </section>
    </div>

    <!-- 2. لوحة العميل -->
    <div id="page-client" class="page-view">
        <div class="dashboard-container">
            <div class="card" style="background: linear-gradient(135deg, var(--primary), #3b82f6); color: white;">
                <h2>لوحة العميل</h2>
            </div>
            <div class="card">
                <div class="card-header">طلب خدمة صيانة 🛠️</div>
                <div class="form-group"><label>نوع الخدمة:</label><select id="c-service"><option>سباكة</option><option>كهرباء</option></select></div>
                <div class="form-group"><label>الوصف:</label><textarea id="c-desc" rows="3"></textarea></div>
                <div class="form-group"><label>إرفاق صورة (سيتم ضغطها آلياً لتسريع الإرسال):</label><input type="file" id="c-image" accept="image/*"></div>
                <button class="btn btn-secondary" id="btn-submit-req" onclick="addRequest()">إرسال الطلب الآن</button>
            </div>
            <div class="card">
                <div class="card-header">سجل طلباتي</div>
                <table>
                    <tr><th>التاريخ</th><th>الخدمة</th><th>الوصف</th><th>المرفق</th><th>الحالة</th></tr>
                    <tbody id="client-requests-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 3. لوحة الإدارة -->
    <div id="page-admin" class="page-view">
        <div class="dashboard-container">
            <div class="card">
                <div class="card-header">لوحة الإدارة - جميع الطلبات 📊</div>
                <table>
                    <tr><th>العميل</th><th>الخدمة</th><th>التفاصيل</th><th>المرفق</th><th>الحالة</th></tr>
                    <tbody id="admin-requests-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="dev-tools">
        <button onclick="navigate('home')">الرئيسية</button>
        <button onclick="navigate('client')">العميل</button>
        <button onclick="navigate('admin')">الإدارة</button>
    </div>

    <script>
        // ✅ رابط السكربت الخاص بك
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2EoC_U_dGyM2R4MdKEKtl0uAnkbeHm_b6i7BSUzmgQNlfbZ5-yieikdOa6575u4c/exec";

        let db = {
            currentUser: localStorage.getItem('currentUser') || '',
            requests: JSON.parse(localStorage.getItem('requests')) || []
        };

        function navigate(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            refreshDashboards();
        }

        function loginUser() { db.currentUser = "محمد (تجربة)"; localStorage.setItem('currentUser', db.currentUser); navigate('client'); }

        // --- 🌟 دالة ضغط الصور (السر هنا) لتجنب رفض جوجل ---
        function getCompressedBase64(file, callback) {
            var reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                var img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    var canvas = document.createElement("canvas");
                    // تصغير أبعاد الصورة لتقليل حجمها بنسبة 90%
                    var MAX_WIDTH = 600; 
                    var MAX_HEIGHT = 600;
                    var width = img.width;
                    var height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width; canvas.height = height;
                    var ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    // تحويل الصورة المضغوطة إلى Base64 بصيغة JPEG
                    var dataUrl = canvas.toDataURL("image/jpeg", 0.6);
                    var base64 = dataUrl.split(",")[1];
                    callback(base64, "image/jpeg", "compressed_image.jpg");
                };
            };
            reader.onerror = function (error) { console.error('خطأ في قراءة الصورة: ', error); callback(null, null, null); };
        }

        function addRequest() {
            let service = document.getElementById('c-service').value;
            let desc = document.getElementById('c-desc').value;
            let fileInput = document.getElementById('c-image');
            let btn = document.getElementById('btn-submit-req');

            if(!desc) return alert("الرجاء كتابة وصف للمشكلة");

            btn.innerText = "جاري الاتصال بخوادم قوقل...";
            btn.disabled = true;

            let payload = {
                action: "addRequest",
                user: db.currentUser || 'عميل',
                service: service,
                desc: desc,
                imageBase64: "", imageMimeType: "", imageFileName: ""
            };

            // معالجة وضغط الصورة إن وجدت
            if (fileInput.files.length > 0) {
                getCompressedBase64(fileInput.files[0], function(base64, mime, name) {
                    payload.imageBase64 = base64;
                    payload.imageMimeType = mime;
                    payload.imageFileName = name;
                    submitToGoogleAndLocal(payload, btn);
                });
            } else {
                submitToGoogleAndLocal(payload, btn);
            }
        }

        function submitToGoogleAndLocal(payload, btn) {
            // 1. الحفظ المحلي للواجهة
            let localImageSrc = payload.imageBase64 ? "data:" + payload.imageMimeType + ";base64," + payload.imageBase64 : "";
            let newRequest = {
                id: Date.now(), date: new Date().toISOString().split('T')[0], user: payload.user, service: payload.service, desc: payload.desc, image: localImageSrc, status: 'قيد الانتظار'
            };
            db.requests.push(newRequest);
            localStorage.setItem('requests', JSON.stringify(db.requests));
            refreshDashboards(); // تحديث الواجهة فوراً للعميل

            // 2. 🌟 الإرسال لقوقل (بدون التحقق من الـ CORS المعقد)
            // نستخدم text/plain لتجاوز الـ Preflight في المتصفح
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            }).then(response => {
                // قوقل يرسل استجابة غير مهيكلة أحياناً، نأخذ النص فقط
                return response.text();
            }).then(data => {
                console.log("تم وصول البيانات بنجاح إلى قوقل:", data);
                alert("تم تسجيل طلبك وإرساله لقاعدة البيانات بنجاح!");
            }).catch(err => {
                console.error("لم ينجح الاتصال بقوقل:", err);
                alert("الطلب مسجل في النظام، لكن حدث بطء في الاتصال بقاعدة البيانات.");
            }).finally(() => {
                document.getElementById('c-desc').value = '';
                document.getElementById('c-image').value = '';
                btn.innerText = "إرسال الطلب الآن";
                btn.disabled = false;
            });
        }

        function refreshDashboards() {
            let htmlClient = '', htmlAdmin = '';
            db.requests.forEach(r => {
                let badge = r.status === 'مكتمل' ? 'badge-success' : 'badge-pending';
                let imageTag = r.image ? `<a href="${r.image}" target="_blank" style="color:var(--primary); font-weight:bold;">🖼️ عرض</a>` : `<span style="color:#ccc; font-size:12px;">بدون</span>`;
                
                htmlClient += `<tr><td>${r.date}</td><td>${r.service}</td><td>${r.desc}</td><td>${imageTag}</td><td><span class="badge ${badge}">${r.status}</span></td></tr>`;
                htmlAdmin += `<tr><td>${r.user}</td><td>${r.service}</td><td>${r.desc}</td><td>${imageTag}</td><td><span class="badge ${badge}">${r.status}</span></td></tr>`;
            });
            document.getElementById('client-requests-list').innerHTML = htmlClient;
            if(document.getElementById('admin-requests-list')) document.getElementById('admin-requests-list').innerHTML = htmlAdmin;
        }

        if(db.currentUser) navigate('client'); else navigate('home');
    </script>
</body>
</html>
